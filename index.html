<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>用戶榮譽排行榜</title>
<style>
  /* =========================================
     1. Design Tokens (系統化設計規範)
     ========================================= */
  :root {
    --font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
    --font-title-l: 22px;
    --font-title-m: 20px;
    --font-body-l: 16px;
    --font-body-m: 14px;
    --font-body-s: 12px;

    --surface: #191919;
    --surface-container: #232323;
    --surface-container-variant: #474747;
    --text-primary: #FFFFFF;
    --text-secondary: #C8C8C8;
    --outline: #474747;
    --outline-variant: rgba(71, 71, 71, 0.4);
    
    --primary: #F6418D;
    --gold: #FFA500;
    --silver: #C8C8C8;
    --bronze: #CD7F32;

    --radius-s: 8px;
    --radius-m: 12px;
    --radius-l: 16px;
    --radius-xl: 24px;
    --radius-full: 1000px;
    
    --space-2: 4px;
    --space-3: 8px;
    --space-4: 12px;
    --space-5: 16px;
    --space-6: 24px;
  }

  body {
    font-family: var(--font-family);
    background-color: #0A0A0A;
    color: var(--text-primary);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* 滿版或容器化自適應 */
  .device-container {
    width: 100%;
    max-width: 500px;
    height: 100vh;
    background-color: var(--surface);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 501px) {
    .device-container {
      height: 85vh;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      border: 6px solid #222;
    }
  }

  /* 上半部固定區域 */
  .top-fixed-section {
    flex-shrink: 0;
    background-color: var(--surface);
    z-index: 20;
    position: relative;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    border-bottom: 1px solid var(--outline-variant);
  }

  /* 下半部滾動區域 */
  .content-scroll {
    flex-grow: 1;
    overflow-y: auto;
    padding-bottom: 120px; 
    scrollbar-width: none;
  }
  .content-scroll::-webkit-scrollbar { display: none; }

  /* =========================================
     2. UI Components
     ========================================= */
  .i18n-btn {
    position: absolute;
    top: var(--space-4);
    right: var(--space-4);
    min-width: 36px;
    min-height: 36px;
    border-radius: var(--radius-full);
    background: rgba(35, 35, 35, 0.6);
    backdrop-filter: blur(8px);
    border: 1px solid var(--outline);
    color: var(--text-primary);
    font-size: 13px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 30;
  }

  /* Header */
  .header { padding: 40px var(--space-5) var(--space-3); text-align: center; }
  .header h1 { margin: 0 0 8px 0; font-size: var(--font-title-l); font-weight: 800; }
  .header-subtitle { font-size: var(--font-body-s); color: var(--text-secondary); }

  /* Tabs */
  .tabs-main {
    display: flex; background-color: var(--surface-container);
    border-bottom: 1px solid var(--outline); overflow-x: auto; scrollbar-width: none;
  }
  .tabs-main::-webkit-scrollbar { display: none; }
  .tab-item {
    font-size: var(--font-body-m); color: var(--text-secondary); cursor: pointer;
    white-space: nowrap; padding: 0 var(--space-5); flex: 1; min-height: 48px;
    display: flex; justify-content: center; align-items: center; position: relative; flex-shrink: 0;
    transition: color 0.3s;
  }
  .tab-item.active { color: var(--primary); font-weight: 600; }
  .tab-item.active::after {
    content: ''; position: absolute; bottom: -1px; left: 20%; width: 60%; 
    height: 3px; border-radius: 3px 3px 0 0; background-color: var(--primary);
  }

  /* Podium (置頂區) */
  .podium {
    display: flex; justify-content: center; align-items: flex-end;
    padding: 40px 10px 16px; background: linear-gradient(180deg, rgba(246, 65, 141, 0.08) 0%, transparent 100%);
    gap: var(--space-3); transition: opacity 0.3s; min-height: 140px;
  }
  .podium-item { text-align: center; width: 30%; display: flex; flex-direction: column; align-items: center; }
  .avatar-wrapper { position: relative; margin-bottom: var(--space-3); }
  .avatar-round { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--outline); object-fit: cover; background: var(--surface-container); }
  .no1 .avatar-round { width: 80px; height: 80px; border: 3px solid var(--gold); box-shadow: 0 0 24px rgba(255, 165, 0, 0.25); }
  
  .crown-icon { position: absolute; top: -28px; left: 50%; transform: translateX(-50%); width: 32px; height: 32px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); z-index: 2; }
  .rank-badge { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 12px; font-weight: 600; border-radius: var(--radius-full); padding: 2px 8px; border: 2px solid var(--surface); box-shadow: 0 4px 8px rgba(0,0,0,0.4); min-width: 24px; z-index: 2;}
  .badge-1 { background: var(--gold); color: #000; top: auto; bottom: -12px; }
  .badge-2 { background: var(--silver); color: #000; }
  .badge-3 { background: var(--bronze); }

  .nickname { font-size: 13px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .val-text { font-size: 12px; margin-top: 4px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 4px; }
  .diamond-icon { width: 12px; height: 12px; fill: currentColor; }

  /* List Table */
  .list-row {
    display: flex; align-items: center; padding: var(--space-4) var(--space-5);
    border-bottom: 1px solid var(--outline-variant);
  }
  .rank-num { width: 36px; font-weight: 600; font-size: var(--font-body-l); color: var(--text-secondary); }
  .avatar-square { width: 44px; height: 44px; border-radius: var(--radius-m); margin-right: var(--space-4); object-fit: cover; border: 1px solid var(--outline); background: var(--surface-container); }
  .user-info { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
  .user-name { font-size: var(--font-body-m); color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .data-value { font-weight: 600; font-size: var(--font-body-m); text-align: right; padding-left: 8px; display: flex; align-items: center; gap: 4px;}

  /* Sticky Footer */
  .sticky-footer {
    position: absolute; bottom: 20px; left: var(--space-4); right: var(--space-4);
    background: rgba(35, 35, 35, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.15); border-radius: var(--radius-l);
    padding: var(--space-4); box-shadow: 0 12px 32px rgba(0,0,0,0.8); z-index: 30;
  }
  .my-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-3); }
  .my-avatar { width: 44px; height: 44px; border-radius: var(--radius-s); margin-right: var(--space-3); border: 1px solid var(--primary); background: var(--surface-container); }
  
  .toggle-wrapper { display: flex; flex-direction: column; align-items: flex-end; }
  .toggle-container { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .toggle-label { font-size: 11px; color: var(--text-secondary); font-weight: 600; transition: color 0.3s;}
  .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--outline); transition: .4s; border-radius: 20px; }
  .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--primary); }
  input:checked + .slider:before { transform: translateX(16px); }

  /* Empty & Skeleton */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: var(--font-body-m); }
  @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
  .skeleton { background: linear-gradient(90deg, var(--surface-container) 25%, var(--surface-container-variant) 50%, var(--surface-container) 75%); background-size: 400px 100%; animation: shimmer 1.5s infinite linear; border-radius: var(--radius-s); color: transparent !important; border: none !important;}
  .sk-avatar { width: 44px; height: 44px; }
  .sk-text { height: 16px; width: 120px; }
  .sk-text-short { height: 14px; width: 60px; }
</style>
</head>
<body>

<div class="device-container">
  <div class="i18n-btn" id="langBtn" onclick="toggleLang()">繁</div>

  <div class="top-fixed-section">
    <div class="header">
      <h1 data-i18n="title">2026 璀璨之星爭奪戰</h1>
      <div class="header-subtitle" data-i18n="time">活動時間：2026/04/07 ~ 2026/04/30</div>
    </div>

    <!-- Main Tabs -->
    <div class="tabs-main" id="mainTabsContainer">
      <div class="tab-item active" onclick="changeMode('hour', this, '#F6418D')" data-i18n="tabHour">小時</div>
      <div class="tab-item" onclick="changeMode('day', this, '#FFA500')" data-i18n="tabDay">日</div>
      <div class="tab-item" onclick="changeMode('week', this, '#60C4E8')" data-i18n="tabWeek">週</div>
      <div class="tab-item" onclick="changeMode('month', this, '#15EA48')" data-i18n="tabMonth">月</div>
    </div>

    <!-- Podium View -->
    <div id="podiumView">
      <div class="podium" id="podiumContent">
        <!-- 骨架屏頒獎台 -->
        <div class="podium-item no2"><div class="avatar-wrapper"><div class="avatar-round skeleton"></div></div><div class="skeleton sk-text-short"></div></div>
        <div class="podium-item no1"><div class="avatar-wrapper"><div class="avatar-round skeleton" style="width:80px;height:80px"></div></div><div class="skeleton sk-text-short"></div></div>
        <div class="podium-item no3"><div class="avatar-wrapper"><div class="avatar-round skeleton"></div></div><div class="skeleton sk-text-short"></div></div>
      </div>
    </div>
  </div>

  <div class="content-scroll" id="scrollArea">
    <div class="list-table" id="listView">
      <!-- 骨架屏列表 -->
      <div class="list-row"><div class="rank-num skeleton sk-text-short" style="width:20px"></div><div class="sk-avatar skeleton"></div><div class="user-info"><div class="skeleton sk-text"></div></div></div>
      <div class="list-row"><div class="rank-num skeleton sk-text-short" style="width:20px"></div><div class="sk-avatar skeleton"></div><div class="user-info"><div class="skeleton sk-text"></div></div></div>
      <div class="list-row"><div class="rank-num skeleton sk-text-short" style="width:20px"></div><div class="sk-avatar skeleton"></div><div class="user-info"><div class="skeleton sk-text"></div></div></div>
      <div class="list-row"><div class="rank-num skeleton sk-text-short" style="width:20px"></div><div class="sk-avatar skeleton"></div><div class="user-info"><div class="skeleton sk-text"></div></div></div>
    </div>
  </div>

  <!-- Sticky Footer -->
  <div class="sticky-footer" id="footerBar">
    <div class="my-info">
      <div style="display:flex; align-items:center;">
        <img src="" class="my-avatar skeleton" id="myAvatar">
        <div style="display:flex; flex-direction:column; justify-content:center;">
            <span style="font-size:var(--font-body-s); color:var(--text-secondary); margin-bottom:2px" data-i18n="myRank">我的排名</span>
            <span style="font-size:var(--font-body-l); font-weight:bold; color:var(--primary)" id="myRankNum" class="skeleton sk-text-short">--</span>
        </div>
      </div>
      
      <div class="toggle-wrapper">
        <span id="myValueText" class="skeleton sk-text-short" style="font-size:var(--font-body-l); font-weight:600; color:var(--primary); margin-bottom:4px;">--</span>
        <div class="toggle-container">
          <span class="toggle-label" id="anonLabel" data-i18n="public">公開</span>
          <label class="switch">
            <input type="checkbox" id="anonToggle" onchange="toggleAnonymous()">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* =========================================
   1. 環境與狀態變數
   ========================================= */
const API_ENDPOINT = 'https://swag-campaign-api-905468082258.asia-east1.run.app/api/leaderboard';
let swagToken = null;
let handshakeRetryInterval = null;
let currentMode = 'hour';
let currentThemeColor = '#F6418D';
let isAnonymous = false;
let myOriginalId = "Me"; // 暫存自己的真實 ID 用於頭像生成

const diamondSVG = `<svg class="diamond-icon" viewBox="0 0 24 24"><path d="M12 2L2 9l10 13L22 9l-10-7zm0 2.8l6.3 4.4H5.7L12 4.8zM4.1 10h15.8L12 20.3 4.1 10z"/></svg>`;
const crownSVG = `<svg viewBox="0 0 24 24" fill="none" class="crown-icon"><path d="M2 19H22V21H2V19ZM3 5L7 12L12 3L17 12L21 5L19 17H5L3 5Z" fill="var(--gold)"/><path d="M12 9C12.5523 9 13 8.55228 13 8C13 7.44772 12.5523 7 12 7C11.4477 7 11 7.44772 11 8C11 8.55228 11.4477 9 12 9Z" fill="#FFF"/></svg>`;

/* =========================================
   2. 多語系 (I18n) 模組
   ========================================= */
const i18n = {
  'Hant': { title: '2026 璀璨之星爭奪戰', time: '活動時間：2026/04/07 ~ 2026/04/30', tabHour: '小時', tabDay: '日', tabWeek: '週', tabMonth: '月', myRank: '我的排名', unranked: '未上榜', public: '公開', hidden: '隱身', empty: '暫無排名資料' },
  'EN': { title: '2026 Star Battle', time: 'Period: Apr 7 - Apr 30, 2026', tabHour: 'Hour', tabDay: 'Day', tabWeek: 'Week', tabMonth: 'Month', myRank: 'My Rank', unranked: 'Unranked', public: 'Public', hidden: 'Hidden', empty: 'No data available' }
};
let lang = 'Hant';

function toggleLang() {
  lang = lang === 'Hant' ? 'EN' : 'Hant';
  document.getElementById('langBtn').innerText = lang === 'Hant' ? '繁' : 'EN';
  
  const dict = i18n[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.innerText = dict[el.getAttribute('data-i18n')];
  });
  
  toggleAnonymous(); // 刷新隱身文字狀態
}

/* =========================================
   3. SWAG Iframe 通訊與 API 獲取
   ========================================= */
function postIframeReady() { window.parent.postMessage({ type: 'IFRAME_READY' }, '*'); }

window.addEventListener('DOMContentLoaded', () => {
  toggleLang(); // 初始化語系
  setTimeout(postIframeReady, 100);
  handshakeRetryInterval = setInterval(() => { if (!swagToken) postIframeReady(); }, 3000);
});

window.addEventListener('message', (event) => {
  const data = event.data;
  if (!data) return;
  if (data.type === 'SET_TOKEN') {
    if (swagToken === data.token) return;
    swagToken = data.token;
    if (handshakeRetryInterval) { clearInterval(handshakeRetryInterval); handshakeRetryInterval = null; }
    fetchApiData();
  }
});

async function fetchApiData() {
  showSkeleton();
  try {
    // 帶入 mode 參數讓後端根據 Tab 切換撈取對應資料
    const res = await fetch(`${API_ENDPOINT}?mode=${currentMode}`, {
      headers: { 'Authorization': `Bearer ${swagToken}` }
    });
    if (!res.ok) throw new Error(`API Error: ${res.status}`);
    const data = await res.json();
    renderContent(data.leaderboard ||[], data.me || { rank: -1, total_diamonds: 0, user_id: 'Me' });
  } catch (err) {
    console.error('Fetch Data Error:', err);
    document.getElementById('podiumContent').innerHTML = '';
    document.getElementById('listView').innerHTML = `<div class="empty-state">連線失敗，請稍後再試</div>`;
  }
}

/* =========================================
   4. UI 渲染邏輯
   ========================================= */
function hexToRgb(hex) {
  var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '246, 65, 141';
}

function changeMode(type, el, color) {
  if (currentMode === type) return;
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  
  currentMode = type;
  currentThemeColor = color;
  document.documentElement.style.setProperty('--primary', color);
  document.querySelector('.podium').style.background = `linear-gradient(180deg, rgba(${hexToRgb(color)}, 0.08) 0%, transparent 100%)`;
  
  if (swagToken) {
    fetchApiData(); // 重新 Call API
  } else {
    showSkeleton(); // 若無 token 繼續顯示骨架屏
  }
}

function showSkeleton() {
  document.getElementById('podiumContent').innerHTML = `
    <div class="podium-item no2"><div class="avatar-wrapper"><div class="avatar-round skeleton"></div></div><div class="skeleton sk-text-short"></div></div>
    <div class="podium-item no1"><div class="avatar-wrapper"><div class="avatar-round skeleton" style="width:80px;height:80px"></div></div><div class="skeleton sk-text-short"></div></div>
    <div class="podium-item no3"><div class="avatar-wrapper"><div class="avatar-round skeleton"></div></div><div class="skeleton sk-text-short"></div></div>
  `;
  document.getElementById('listView').innerHTML = Array(6).fill(`<div class="list-row"><div class="rank-num skeleton sk-text-short" style="width:20px"></div><div class="sk-avatar skeleton"></div><div class="user-info"><div class="skeleton sk-text"></div></div></div>`).join('');
}

function renderContent(leaderboard, meData) {
  // 處理個人狀態區塊
  myOriginalId = meData.user_id || meData.masked_user_id || "Me";
  const myRankEl = document.getElementById('myRankNum');
  const myValueEl = document.getElementById('myValueText');
  const myAvatarEl = document.getElementById('myAvatar');
  
  myRankEl.classList.remove('skeleton', 'sk-text-short');
  myValueEl.classList.remove('skeleton', 'sk-text-short');
  myAvatarEl.classList.remove('skeleton');

  myRankEl.innerText = meData.rank === -1 ? i18n[lang].unranked : `No.${meData.rank}`;
  myValueEl.innerHTML = `${meData.total_diamonds.toLocaleString()} ${diamondSVG}`;
  
  // 觸發一次頭像更新邏輯
  toggleAnonymous();

  // 處理排行榜 (前3名與剩餘)
  const top3 = leaderboard.slice(0, 3);
  const rest = leaderboard.slice(3);
  const podiumEl = document.getElementById('podiumContent');
  const listEl = document.getElementById('listView');

  if (leaderboard.length === 0) {
    podiumEl.innerHTML = '';
    listEl.innerHTML = `<div class="empty-state">${i18n[lang].empty}</div>`;
    return;
  }

  // 渲染頒獎台 (防呆：若少於 3 人也正常顯示)
  let podiumHtml = '';
  const generatePodiumItem = (user, rankClass, badgeClass, badgeNum, isCrown) => {
    if (!user) return `<div class="podium-item ${rankClass}"></div>`;
    const id = user.user_id || user.masked_user_id;
    return `
      <div class="podium-item ${rankClass}">
        <div class="avatar-wrapper">
          ${isCrown ? crownSVG : ''}
          <div class="rank-badge ${badgeClass}">${badgeNum}</div>
          <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=${id}" class="avatar-round">
        </div>
        <div class="nickname" style="${isCrown ? 'font-weight:600;' : ''}">${id}</div>
        <div class="val-text" style="color:${currentThemeColor}">${user.total_diamonds.toLocaleString()} ${diamondSVG}</div>
      </div>
    `;
  };

  podiumHtml += generatePodiumItem(top3[1], 'no2', 'badge-2', '2', false);
  podiumHtml += generatePodiumItem(top3[0], 'no1', 'badge-1', '1', true);
  podiumHtml += generatePodiumItem(top3[2], 'no3', 'badge-3', '3', false);
  podiumEl.innerHTML = podiumHtml;

  // 渲染列表
  listEl.innerHTML = rest.map(user => {
    const id = user.user_id || user.masked_user_id;
    return `
      <div class="list-row">
        <div class="rank-num">${user.rank}</div>
        <img src="https://api.dicebear.com/8.x/initials/svg?seed=${id}" class="avatar-square">
        <div class="user-info"><div class="user-name">${id}</div></div>
        <div class="data-value" style="color:${currentThemeColor}">${user.total_diamonds.toLocaleString()} ${diamondSVG}</div>
      </div>
    `;
  }).join('');
  
  document.getElementById('scrollArea').scrollTop = 0;
}

/* =========================================
   5. 隱身開關控制
   ========================================= */
function toggleAnonymous() {
  isAnonymous = document.getElementById('anonToggle').checked;
  const anonLabel = document.getElementById('anonLabel');
  const footerAvatar = document.getElementById('myAvatar');

  if (isAnonymous) {
    anonLabel.innerText = i18n[lang].hidden;
    anonLabel.style.color = "var(--primary)";
    footerAvatar.src = "https://api.dicebear.com/8.x/bottts/svg?seed=Ghost&backgroundColor=474747";
  } else {
    anonLabel.innerText = i18n[lang].public;
    anonLabel.style.color = "var(--text-secondary)";
    // 依賴真實 ID 生成固定頭像
    footerAvatar.src = `https://api.dicebear.com/8.x/avataaars/svg?seed=${myOriginalId}`;
  }
}

/* =========================================
   6. PWA 跨視窗導航攔截 (Navigation Interceptor)
   ========================================= */
document.addEventListener('click', (e) => {
  if (window.self === window.top) return; // 若非 iframe 環境則不攔截

  const link = e.target.closest('a[target="_blank"]');
  if (link) {
    try {
      const url = new URL(link.href);
      if (url.hostname === 'swag.live' || url.hostname === 'www.swag.live') {
        e.preventDefault();
        window.parent.postMessage({ type: 'PWA_NAVIGATE', url: link.href }, '*');
      }
    } catch(err) {
      console.error("URL Parsing Error", err);
    }
  }
});
</script>
</body>
