<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用戶耗鑽榮譽榜 - 互動功能版</title>
<style>
  :root {
    --bg-color: #121212;
    --card-bg: #1e1e1e;
    --text-primary: #ffffff;
    --text-secondary: #b0b0b0;
    --accent-gold: #ffd700;
    --accent-silver: #c0c0c0;
    --accent-bronze: #cd7f32;
    --highlight: #ff4081; /* 即時榜顏色 */
    --legend-purple: #a155ff; /* 累積榜顏色 */
  }

  body {
    font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background-color: #000;
    color: var(--text-primary);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .phone-container {
    width: 375px;
    height: 812px;
    background-color: var(--card-bg);
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    position: relative;
    overflow: hidden;
    border: 8px solid #333;
    border-radius: 40px;
  }

  /* 動態更換的主題色 */
  .theme-accent { color: var(--highlight); transition: 0.3s; }
  .theme-bg { background-color: var(--highlight); transition: 0.3s; }
  .theme-border { border-color: var(--highlight); transition: 0.3s; }

  .content-scroll {
    height: calc(100% - 110px);
    overflow-y: auto;
    padding-bottom: 20px;
  }
  .content-scroll::-webkit-scrollbar { width: 0px; }

  .header {
    background: linear-gradient(180deg, rgba(255, 64, 129, 0.2) 0%, rgba(30,30,30,1) 100%);
    padding: 20px;
    text-align: center;
    transition: 0.3s;
  }

  .header h1 { margin: 0; font-size: 20px; font-weight: 600; }

  .tabs {
    display: flex;
    justify-content: space-around;
    background-color: rgba(0,0,0,0.3);
    padding: 10px 0;
    border-bottom: 1px solid #333;
  }

  .tab {
    color: var(--text-secondary);
    font-size: 13px;
    padding: 5px 5px;
    cursor: pointer;
    position: relative;
    transition: 0.3s;
  }

  .tab.active { color: var(--highlight); font-weight: 600; }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 0;
    width: 100%;
    height: 2px;
    background-color: var(--highlight);
  }

  .countdown-banner {
    background-color: rgba(255, 64, 129, 0.1);
    color: var(--highlight);
    text-align: center;
    padding: 8px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255, 64, 129, 0.1);
  }

  /* Podium */
  .podium {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding: 30px 10px;
    background: linear-gradient(180deg, rgba(30,30,30,1) 0%, rgba(0,0,0,0.3) 100%);
  }
  .podium-item { text-align: center; width: 100px; position: relative; }
  .podium-item.no1 { width: 120px; margin: 0 10px; }
  .avatar { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #555; object-fit: cover; }
  .podium-item.no1 .avatar { width: 90px; height: 90px; border-color: var(--highlight); box-shadow: 0 0 15px rgba(255, 64, 129, 0.3); }
  .crown { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 24px; }
  .rank-badge { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); background-color: var(--highlight); color: #fff; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: bold; }

  /* List */
  .list-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #2a2a2a; }
  .list-rank { width: 35px; font-size: 16px; font-weight: 600; color: var(--text-secondary); }
  .list-avatar-square { width: 44px; height: 44px; border-radius: 8px; margin-right: 12px; object-fit: cover; }
  .list-nickname { flex: 1; font-size: 15px; }
  .list-value { color: var(--highlight); font-size: 15px; font-weight: 500; text-align: right; }

  /* Sticky Bar */
  .my-status-bar {
    position: absolute;
    bottom: 25px;
    left: 10px;
    width: calc(100% - 20px);
    height: 90px;
    background-color: #262626;
    border: 2px solid var(--highlight);
    border-radius: 20px;
    padding: 15px 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    box-shadow: 0 -5px 20px rgba(0,0,0,0.6);
    transition: 0.3s;
  }
  .my-info-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .my-rank-info { display: flex; align-items: center; font-size: 14px; }
  .my-avatar-square { width: 32px; height: 32px; border-radius: 6px; margin-right: 10px; border: 1px solid var(--highlight); object-fit: cover; }
  .my-rank-text span { color: var(--highlight); font-weight: bold; font-size: 16px; }
  .my-val-display { color: var(--highlight); font-size: 14px; font-weight: 600; }
  .tip-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-secondary); border-top: 1px solid #444; padding-top: 8px; }
  .action-btn { background-color: var(--highlight); color: white; border: none; border-radius: 15px; padding: 4px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }

  @media (max-width: 400px) {
    .phone-container { width: 100%; height: 100vh; border: none; border-radius: 0; }
    .my-status-bar { bottom: 15px; }
  }
</style>
</head>
<body>

<div class="phone-container">
  <div class="content-scroll" id="scrollContent">
    <div class="header" id="mainHeader">
      <h1 id="titleDisplay">榮譽巔峰榜</h1>
      <span class="rule-icon">❓</span>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('hour', this)">小時榜</div>
      <div class="tab" onclick="switchTab('day', this)">日榜</div>
      <div class="tab" onclick="switchTab('week', this)">週榜</div>
      <div class="tab" onclick="switchTab('month', this)">月榜</div>
      <div class="tab" onclick="switchTab('all', this)">累積榜</div>
    </div>

    <div class="countdown-banner" id="bannerDisplay">
      ⏱️ 距離 14:00 結算剩餘：12分43秒
    </div>

    <div id="podiumArea" class="podium">
      </div>

    <div id="listArea" class="list-container">
      </div>
  </div>

  <div class="my-status-bar" id="myStatusBar">
    <div class="my-info-row">
      <div class="my-rank-info">
        <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Me" class="my-avatar-square" id="myAvatarBorder">
        <div class="my-rank-text">我的排名：<span id="myRank">#7</span></div>
      </div>
      <div class="my-val-display" id="myValue">本期：48,000 💎</div>
    </div>
    <div class="tip-row">
      <div id="gapText">距離第 6 名還差 <span>3,200</span> 💎</div>
      <button class="action-btn" id="myBtn">去衝榜 ></button>
    </div>
  </div>
</div>

<script>
// 模擬數據
const dataStore = {
  hour: {
    title: "榮譽巔峰榜",
    banner: "⏱️ 距離 14:00 結算剩餘：12分43秒",
    unit: "💎",
    theme: "#ff4081",
    top3: [
      { name: "耗鑽狂魔哥", val: "120,500", seed: "King" },
      { name: "隔壁老王", val: "89,200", seed: "Wang" },
      { name: "小美愛跳舞", val: "75,000", seed: "Mei" }
    ],
    list: [
      { rank: 4, name: "貓奴一號", val: "62,000", seed: "Cat" },
      { rank: 5, name: "衝榜小弟", val: "58,500", seed: "Boy" },
      { rank: 6, name: "天天解鎖", val: "51,200", seed: "Un" },
      { rank: 7, name: "我是七號 (Me)", val: "48,000", seed: "Me", isMe: true }
    ],
    my: { rank: "#7", val: "本期：48,000 💎", gap: "距離第 6 名還差 <span>3,200</span> 💎" }
  },
  all: {
    title: "傳奇榮譽累積榜",
    banner: "🏆 勳章榮耀：統計全站獲得冠軍次數排行",
    unit: "次冠軍",
    theme: "#a155ff",
    top3: [
      { name: "鑽石教父", val: "156", seed: "Godfather" },
      { name: "古董大亨", val: "112", seed: "Rich" },
      { name: "傳奇收藏家", val: "89", seed: "Collector" }
    ],
    list: [
      { rank: 4, name: "神秘大戶", val: "72", seed: "Secret" },
      { rank: 5, name: "老牌贊助者", val: "54", seed: "Old" },
      { rank: 11, name: "路人甲", val: "21", seed: "Passer" },
      { rank: 12, name: "我是七號 (Me)", val: "18", seed: "Me", isMe: true }
    ],
    my: { rank: "#12", val: "總奪冠：18 次", gap: "再拿 <span>3</span> 次冠軍提升排名" }
  }
};

// 切換邏輯
function switchTab(type, el) {
  // 處理 Tab 樣式
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  const content = (type === 'all') ? dataStore.all : dataStore.hour; // 其他暫用 hour 數據
  
  // 更新主題色
  const themeColor = content.theme;
  document.documentElement.style.setProperty('--highlight', themeColor);
  document.getElementById('mainHeader').style.background = `linear-gradient(180deg, ${themeColor}33 0%, rgba(30,30,30,1) 100%)`;
  document.getElementById('myStatusBar').style.borderColor = themeColor;
  document.querySelector('.tab.active').style.color = themeColor;
  
  // 更新文字
  document.getElementById('titleDisplay').innerText = content.title;
  document.getElementById('bannerDisplay').innerText = content.banner;
  document.getElementById('bannerDisplay').style.color = themeColor;
  document.getElementById('bannerDisplay').style.backgroundColor = `${themeColor}1a`;
  
  // 更新 Podium (前三名)
  const podiumHTML = `
    <div class="podium-item no2">
      <div class="avatar-container">
        <div class="crown">🥈</div>
        <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=${content.top3[1].seed}" class="avatar" style="border-color:var(--accent-silver)">
        <div class="rank-badge" style="background-color:var(--accent-silver)">2</div>
      </div>
      <div class="nickname">${content.top3[1].name}</div>
      <div class="diamond-count" style="color:${themeColor}">${content.top3[1].val} ${content.unit}</div>
    </div>
    <div class="podium-item no1">
      <div class="avatar-container">
        <div class="crown">🥇</div>
        <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=${content.top3[0].seed}" class="avatar" style="border-color:${themeColor}">
        <div class="rank-badge" style="background-color:${themeColor}">1</div>
      </div>
      <div class="nickname">${content.top3[0].name}</div>
      <div class="diamond-count" style="color:${themeColor}">${content.top3[0].val} ${content.unit}</div>
    </div>
    <div class="podium-item no3">
      <div class="avatar-container">
        <div class="crown">🥉</div>
        <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=${content.top3[2].seed}" class="avatar" style="border-color:var(--accent-bronze)">
        <div class="rank-badge" style="background-color:var(--accent-bronze)">3</div>
      </div>
      <div class="nickname">${content.top3[2].name}</div>
      <div class="diamond-count" style="color:${themeColor}">${content.top3[2].val} ${content.unit}</div>
    </div>
  `;
  document.getElementById('podiumArea').innerHTML = podiumHTML;

  // 更新 List (4名以後)
  let listHTML = '';
  content.list.forEach(item => {
    const isMeStyle = item.isMe ? `style="background-color: ${themeColor}14; color: ${themeColor};"` : '';
    const rankColor = item.isMe ? `style="color:${themeColor}"` : '';
    listHTML += `
      <div class="list-item" ${isMeStyle}>
        <div class="list-rank" ${rankColor}>${item.rank}</div>
        <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=${item.seed}" class="list-avatar-square" ${item.isMe ? `style="border:1px solid ${themeColor}"` : ''}>
        <div class="list-nickname">${item.name}</div>
        <div class="list-value" style="color:${themeColor}">${item.val} ${content.unit}</div>
      </div>
    `;
  });
  document.getElementById('listArea').innerHTML = listHTML;

  // 更新 My Status Bar
  document.getElementById('myRank').innerText = content.my.rank;
  document.getElementById('myRank').style.color = themeColor;
  document.getElementById('myValue').innerText = content.my.val;
  document.getElementById('myValue').style.color = themeColor;
  document.getElementById('gapText').innerHTML = content.my.gap;
  document.getElementById('myAvatarBorder').style.borderColor = themeColor;
  document.getElementById('myBtn').style.backgroundColor = themeColor;
  
  // 回到頂端
  document.getElementById('scrollContent').scrollTop = 0;
}

// 初始化
window.onload = () => {
  switchTab('hour', document.querySelector('.tab'));
};
</script>

</body>
</html>
