<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用戶榮譽排行榜 - 視覺優化版</title>
<style>
  :root {
    --font-main: "PingFang TC", "Microsoft JhengHei", sans-serif;
    --surface: #191919;
    --surface-container: #232323;
    --primary: #F6418D; /* 預設即時榜顏色 */
    --loverse-pink: #F6418D;
    --asset-purple: #8238BA;
    --text-primary: #FFFFFF;
    --text-secondary: #C8C8C8;
    --outline: #383838;
    --gold: #FFA500;
  }

  body {
    font-family: var(--font-main);
    background-color: #000;
    color: var(--text-primary);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .phone-container {
    width: 360px;
    height: 740px;
    background-color: var(--surface);
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    position: relative;
    overflow: hidden;
    border: 8px solid #333;
    border-radius: 40px;
  }

  .content-scroll {
    height: calc(100% - 110px);
    overflow-y: auto;
    padding-bottom: 20px;
  }
  .content-scroll::-webkit-scrollbar { width: 0px; }

  /* Header */
  .header {
    padding: 24px 16px 12px;
    text-align: center;
  }
  .header h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* Main Tabs */
  .tabs-main {
    display: flex;
    justify-content: space-around;
    background-color: var(--surface-container);
    padding: 14px 0;
    border-bottom: 1px solid var(--outline);
  }
  .tab-item {
    font-size: 14px;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 4px 10px;
    position: relative;
    transition: color 0.3s;
  }
  .tab-item.active { color: var(--primary); font-weight: 600; }
  .tab-item.active::after {
    content: ''; position: absolute; bottom: -15px; left: 0; width: 100%; height: 3px; background-color: var(--primary);
  }

  /* Sub Tabs for All (累積榜二級選單) */
  .tabs-sub {
    display: none;
    background-color: #1e1e1e;
    padding: 10px 16px;
    gap: 10px;
    overflow-x: auto;
    border-bottom: 1px solid var(--outline);
  }
  .sub-item {
    font-size: 12px;
    color: var(--text-secondary);
    background: #2a2a2a;
    padding: 6px 14px;
    border-radius: 100px;
    white-space: nowrap;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .sub-item.active { border-color: var(--asset-purple); color: var(--asset-purple); background: rgba(130, 56, 186, 0.1); }

  /* Podium (即時榜前三名) */
  .podium {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding: 40px 10px 30px;
    background: linear-gradient(180deg, rgba(246, 65, 141, 0.1) 0%, transparent 100%);
  }
  .podium-item { text-align: center; width: 100px; position: relative; }
  .avatar-round { width: 68px; height: 68px; border-radius: 50%; border: 3px solid var(--outline); object-fit: cover; }
  .no1 .avatar-round { width: 88px; height: 88px; border-color: var(--gold); box-shadow: 0 0 20px rgba(255, 165, 0, 0.3); }
  .rank-pill { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #fff; font-size: 11px; font-weight: bold; border-radius: 10px; padding: 2px 10px; border: 1px solid rgba(255,255,255,0.2); }

  .nickname { margin-top: 15px; font-size: 14px; color: var(--text-primary); }
  .val-text { font-size: 13px; margin-top: 4px; font-weight: bold; }

  /* List Table (排行清單) */
  .list-row {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--outline);
  }
  .rank-num { 
    width: 40px; /* 增加寬度，避免跟頭像卡住 */
    font-weight: 600; 
    font-size: 16px; 
    color: var(--text-secondary);
    text-align: left;
  }
  .avatar-square { 
    width: 44px; 
    height: 44px; 
    border-radius: 8px; 
    margin-right: 16px; /* 增加與名字的間距 */
    object-fit: cover; 
    border: 1px solid var(--outline);
  }
  .user-name { flex: 1; font-size: 15px; color: var(--text-primary); }
  .data-value { font-weight: 600; font-size: 15px; text-align: right; }

  /* Sticky Footer (我的排名) */
  .sticky-footer {
    position: absolute;
    bottom: 25px; /* 向上移動一點，不貼底 */
    left: 12px;
    right: 12px;
    background: var(--surface-container);
    border: 1.5px solid var(--primary);
    border-radius: 16px;
    padding: 12px 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  }
  .my-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .my-avatar { width: 34px; height: 34px; border-radius: 6px; margin-right: 12px; border: 1px solid var(--primary); }
  .footer-tip { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-secondary); border-top: 1px solid #3d3d3d; padding-top: 10px; }
  .btn-action { background: var(--primary); color: #fff; border: none; padding: 6px 16px; border-radius: 100px; font-size: 12px; font-weight: 600; cursor: pointer; }

</style>
</head>
<body>

<div class="phone-container">
  <div class="content-scroll" id="scrollArea">
    <div class="header">
      <h1 id="mainTitle">即時榮譽榜</h1>
    </div>

    <div class="tabs-main">
      <div class="tab-item active" onclick="changeMode('hour', this)">小時</div>
      <div class="tab-item" onclick="changeMode('day', this)">日</div>
      <div class="tab-item" onclick="changeMode('week', this)">週</div>
      <div class="tab-item" onclick="changeMode('month', this)">月</div>
      <div class="tab-item" onclick="changeMode('all', this)">累積榜</div>
    </div>

    <div class="tabs-sub" id="subTabs">
      <div class="sub-item active" onclick="changeSub('h_win', this)">小時冠軍累積</div>
      <div class="sub-item" onclick="changeSub('d_win', this)">日冠軍累積</div>
      <div class="sub-item" onclick="changeSub('w_win', this)">週冠軍累積</div>
    </div>

    <div id="podiumView">
      <div class="podium" id="podiumContent"></div>
    </div>
    
    <div class="list-table" id="listView"></div>
  </div>

  <div class="sticky-footer" id="footerBar">
    <div class="my-info">
      <div style="display:flex; align-items:center;">
        <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Me" class="my-avatar">
        <span style="font-size:14px;">我的排名：<strong id="myRankNum" style="color:var(--primary)">#7</strong></span>
      </div>
      <span id="myValueText" style="font-size:15px; font-weight:600;">48,520 💎</span>
    </div>
    <div class="footer-tip">
      <span id="gapText">距離上一名還差 3,280 💎</span>
      <button class="btn-action">立即衝榜</button>
    </div>
  </div>
</div>

<script>
// 使用完整數字的模擬數據
const data = {
  hour: {
    color: "#F6418D",
    isPodium: true,
    title: "小時即時榜",
    unit: "💎",
    top3: [
      {n:"耗鑽狂魔哥", v:"120,500", s:"King"},
      {n:"隔壁老王", v:"89,200", s:"Wang"},
      {n:"小美愛跳舞", v:"75,000", s:"Mei"}
    ],
    list: [
      {r:4, n:"貓奴一號", v:"62,300"},
      {r:5, n:"衝榜小弟", v:"58,500"},
      {r:6, n:"天天解鎖", v:"51,800"},
      {r:7, n:"我是七號(Me)", v:"48,520", me:true}
    ],
    my: {r:"#7", v:"48,520 💎", g:"距離上一名還差 3,280 💎"}
  },
  all: {
    color: "#8238BA",
    isPodium: false,
    title: "傳奇奪冠累積榜",
    unit: "次",
    list: [
      {r:1, n:"全站教父", v:"1,250"},
      {r:2, n:"大亨傳奇", v:"892"},
      {r:3, n:"資深收藏家", v:"750"},
      {r:4, n:"神秘大戶", v:"620"},
      {r:12, n:"我是七號(Me)", v:"128", me:true}
    ],
    my: {r:"#12", v:"累計奪冠：128 次", g:"再拿 3 次冠軍可提升排名"}
  }
};

function renderList(modeData) {
  const listArea = document.getElementById('listView');
  listArea.innerHTML = modeData.list.map(item => `
    <div class="list-row" ${item.me ? 'style="background:rgba(246,65,141,0.05)"' : ''}>
      <div class="rank-num" ${item.me ? 'style="color:var(--primary)"' : ''}>${item.r}</div>
      <img src="https://api.dicebear.com/8.x/initials/svg?seed=${item.n}" class="avatar-square" ${item.me ? 'style="border-color:var(--primary)"' : ''}>
      <div class="user-name" ${item.me ? 'style="color:var(--primary); font-weight:600;"' : ''}>${item.n}</div>
      <div class="data-value" style="color:${modeData.color}">${item.v} ${modeData.unit}</div>
    </div>
  `).join('');
}

function changeMode(type, el) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  
  const modeData = (type === 'all') ? data.all : data.hour;
  const themeColor = modeData.color;
  
  document.documentElement.style.setProperty('--primary', themeColor);
  document.getElementById('mainTitle').innerText = modeData.title;
  document.getElementById('subTabs').style.display = (type === 'all') ? 'flex' : 'none';
  document.getElementById('podiumView').style.display = modeData.isPodium ? 'block' : 'none';
  
  if(modeData.isPodium) {
    document.getElementById('podiumContent').innerHTML = `
      <div class="podium-item no2">
        <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=${modeData.top3[1].s}" class="avatar-round">
        <div class="rank-pill" style="background:var(--outline); color:var(--text-secondary)">2</div>
        <div class="nickname">${modeData.top3[1].n}</div>
        <div class="val-text" style="color:${themeColor}">${modeData.top3[1].v}</div>
      </div>
      <div class="podium-item no1">
        <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=${modeData.top3[0].s}" class="avatar-round">
        <div class="rank-pill" style="background:var(--gold); color:#000">1</div>
        <div class="nickname" style="font-weight:600">${modeData.top3[0].n}</div>
        <div class="val-text" style="color:${themeColor}">${modeData.top3[0].v}</div>
      </div>
      <div class="podium-item no3">
        <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=${modeData.top3[2].s}" class="avatar-round">
        <div class="rank-pill" style="background:var(--outline); color:var(--text-secondary)">3</div>
        <div class="nickname">${modeData.top3[2].n}</div>
        <div class="val-text" style="color:${themeColor}">${modeData.top3[2].v}</div>
      </div>
    `;
  }
  
  renderList(modeData);
  document.getElementById('myRankNum').innerText = modeData.my.r;
  document.getElementById('myValueText').innerText = modeData.my.v;
  document.getElementById('gapText').innerHTML = modeData.my.g;
  document.getElementById('scrollArea').scrollTop = 0;
}

function changeSub(sub, el) {
  document.querySelectorAll('.sub-item').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
}

// 預設啟動
window.onload = () => changeMode('hour', document.querySelector('.tab-item'));
</script>
</body>
</html>
