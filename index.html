<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>2026 璀璨之星爭奪戰</title>
  <style>
    :root {
      --bg-dark: #0f111a;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text-main: #fff;
      --text-muted: #94a3b8;
      --accent-gold: #fbbf24;
    }
      * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at top right, rgba(30, 58, 138, 0.2), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(88, 28, 135, 0.2), transparent 40%);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding-bottom: 50px;
    }

    body.pwa-mobile {
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: calc(50px + env(safe-area-inset-bottom, 0));
    }

    .header {
      text-align: center;
      padding: 38px 20px 18px;
    }

    .title {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #fbbf24, #f59e0b, #d97706);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .countdown-wrap {
      margin: 0 auto;
      width: fit-content;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.35);
      border-radius: 999px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .countdown-label { color: var(--text-muted); font-size: 13px; }
    .countdown-time { color: var(--accent-gold); font-size: 15px; font-weight: 700; }

    .container { max-width: 560px; margin: 0 auto; padding: 0 16px; }

    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      margin-bottom: 24px;
    }

    .leaderboard-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; }

    .tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }

    .tab-btn {
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .tab-btn.active {
      color: #111827;
      background: var(--accent-gold);
      border-color: var(--accent-gold);
      font-weight: 700;
    }

    .podium {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .podium-item {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
      background: rgba(255,255,255,0.03);
      min-height: 126px;
    }

    .podium-item.rank-1 {
      background: rgba(251, 191, 36, 0.12);
      border-color: rgba(251, 191, 36, 0.35);
    }

    .podium-rank { font-size: 18px; margin-bottom: 6px; }

    .avatar, .avatar-small {
      object-fit: cover;
      display: block;
      background: #000;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      margin: 0 auto 6px;
    }

    .avatar-small {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .podium-name, .user-id {
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .podium-score, .score-val {
      color: var(--accent-gold);
      font-weight: 700;
      font-size: 13px;
    }

    .list-item {
      display: flex;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 10px;
    }

    .list-item:last-child { border-bottom: none; }
    .rank-num { width: 28px; text-align: center; color: var(--text-muted); font-weight: 700; }

    .user-block { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .score-wrap { display: flex; align-items: center; gap: 4px; }

    .diamond-icon { width: 16px; height: 16px; fill: var(--accent-gold); }

    .empty-state {
      text-align:center;
      padding: 22px;
      color: var(--text-muted);
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 12px;
    }

    #dev-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%;
      background: #ef4444;
      color: #fff;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      font-weight: 700;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="dev-banner">⚠️ [DEV MODE] 目前為本地預覽資料，請勿作為正式營運參考</div>

  <div class="header">
    <div class="title">2026 璀璨之星爭奪戰</div>
    <div class="subtitle">活動時間：2026/04/07 ~ 2026/04/30</div>
    <div class="countdown-wrap">
      <span class="countdown-label" id="countdown-label">日榜結算倒數（GMT+8）</span>
      <span class="countdown-time" id="countdown-time">--</span>
    </div>
  </div>

  <div class="container">
    <div class="glass-card">
      <div class="leaderboard-title">排行榜</div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="daily">日榜</button>
        <button class="tab-btn" data-tab="weekly">週榜</button>
        <button class="tab-btn" data-tab="cumulative">累積榜</button>
      </div>
      <div id="podium" class="podium"></div>
      <div id="leaderboard-list"></div>
    </div>
  </div>

  <script>
    const API_ENDPOINT = 'https://swag-campaign-api-905468082258.asia-east1.run.app/api/leaderboard';
    const BLACK_IMG = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect width="200" height="200" fill="black"/></svg>';
    let swagToken = null;
    let handshakeRetryInterval = null;
    let currentTab = 'daily';

    const boardData = {
      daily: [],
      weekly: [],
      cumulative: []
    };

    function isMobileDevice() {
      return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');
    }

    function setupPwaMode() {
      if (isMobileDevice()) {
        document.body.classList.add('pwa-mobile');
        window.parent.postMessage({ type: 'PWA_MOBILE_MODE', enabled: true }, '*');
      }
    }

    function getAvatarUrl(userId) {
      const safeId = encodeURIComponent(String(userId || ''));
      return `https://public.swag.live/users/${safeId}/picture.jpg?size=512x512&format=jpg`;
    }

    function normalizeUser(user, rankFallback = 0) {
      const userId = user.user_id || user.userid || user.username || user.masked_user_id || user.id || 'unknown';
      return {
        user_id: userId,
        rank: Number(user.rank ?? rankFallback),
        total_diamonds: Number(user.total_diamonds || user.score || 0),
        daily_first_count: Number(user.daily_first_count || user.daily_top1_count || 0),
        weekly_first_count: Number(user.weekly_first_count || user.weekly_top1_count || 0)
      };
    }

    function buildCumulativeBoard(dailyBoard, weeklyBoard) {
      const map = new Map();
      const ensure = (uid) => {
        if (!map.has(uid)) {
          map.set(uid, { user_id: uid, daily_first_count: 0, weekly_first_count: 0, total_first_count: 0 });
        }
        return map.get(uid);
      };

      dailyBoard.forEach((u) => {
        const user = ensure(u.user_id);
        user.daily_first_count += (u.daily_first_count || 0) + (u.rank === 1 ? 1 : 0);
      });

      weeklyBoard.forEach((u) => {
        const user = ensure(u.user_id);
        user.weekly_first_count += (u.weekly_first_count || 0) + (u.rank === 1 ? 1 : 0);
      });

      return [...map.values()]
        .map((u) => ({ ...u, total_first_count: u.daily_first_count + u.weekly_first_count }))
        .sort((a, b) => b.total_first_count - a.total_first_count || a.user_id.localeCompare(b.user_id))
        .map((u, idx) => ({ ...u, rank: idx + 1 }));
    }

    function renderAvatar(userId, cls) {
      return `<img class="${cls}" src="${getAvatarUrl(userId)}" alt="${userId}" referrerpolicy="no-referrer" loading="lazy" onerror="this.onerror=null;this.src='${BLACK_IMG}'"/>`;
    }

    function renderCurrentBoard() {
      const listContainer = document.getElementById('leaderboard-list');
      const podiumContainer = document.getElementById('podium');
      const data = boardData[currentTab] || [];

      listContainer.innerHTML = '';
      podiumContainer.innerHTML = '';

      if (!data.length) {
        listContainer.innerHTML = '<div class="empty-state">暫無資料</div>';
        return;
      }

      const topThree = data.slice(0, 3);
      topThree.forEach((user) => {
        const div = document.createElement('div');
        div.className = `podium-item rank-${user.rank}`;
        const scoreText = currentTab === 'cumulative'
          ? `日榜#1 ${user.daily_first_count} / 週榜#1 ${user.weekly_first_count}`
          : `${user.total_diamonds.toLocaleString()} 鑽`;
        div.innerHTML = `
          <div class="podium-rank">${['🥇', '🥈', '🥉'][user.rank - 1] || user.rank}</div>
          ${renderAvatar(user.user_id, 'avatar')}
          <div class="podium-name">${user.user_id}</div>
          <div class="podium-score">${scoreText}</div>
        `;
        podiumContainer.appendChild(div);
      });

      data.slice(3).forEach((user) => {
        const item = document.createElement('div');
        const scoreBlock = currentTab === 'cumulative'
          ? `<span class="score-val">${user.total_first_count} 次</span>`
          : `<span class="score-val">${user.total_diamonds.toLocaleString()}</span><svg class="diamond-icon" viewBox="0 0 24 24"><path d="M12 2L2 9l10 13L22 9l-10-7zm0 2.8l6.3 4.4H5.7L12 4.8zM4.1 10h15.8L12 20.3 4.1 10z"/></svg>`;

        item.className = 'list-item';
        item.innerHTML = `
          <div class="rank-num">${user.rank}</div>
          <div class="user-block">
            ${renderAvatar(user.user_id, 'avatar-small')}
            <div class="user-id">${user.user_id}</div>
          </div>
          <div class="score-wrap">${scoreBlock}</div>
        `;
        listContainer.appendChild(item);
      });
    }

    function toGmt8Date(now = new Date()) {
      const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
      return new Date(utcMs + 8 * 3600000);
    }

    function getCountdownTarget(tab, gmt8Now) {
      const target = new Date(gmt8Now);
      if (tab === 'weekly') {
        const day = target.getDay();
        const addDays = (7 - day) % 7;
        target.setDate(target.getDate() + addDays);
      }
      target.setHours(23, 59, 59, 999);
      return target;
    }

    function formatDuration(ms) {
      const safeMs = Math.max(0, ms);
      const totalSeconds = Math.floor(safeMs / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const mins = Math.floor((totalSeconds % 3600) / 60);
      const secs = totalSeconds % 60;
      return `${days}日 / ${hours}小時 / ${mins}分 / ${secs}秒`;
    }

    function updateCountdown() {
      const labelEl = document.getElementById('countdown-label');
      const timeEl = document.getElementById('countdown-time');
      const gmt8Now = toGmt8Date();
      if (currentTab === 'weekly') {
        labelEl.textContent = '週榜結算倒數（至週日 23:59 GMT+8）';
      } else if (currentTab === 'daily') {
        labelEl.textContent = '日榜結算倒數（至今日 23:59 GMT+8）';
      } else {
        labelEl.textContent = '累積榜結算倒數（至活動結束）';
      }

      const target = getCountdownTarget(currentTab === 'cumulative' ? 'weekly' : currentTab, gmt8Now);
      timeEl.textContent = formatDuration(target.getTime() - gmt8Now.getTime());
    }

    async function fetchPeriodBoard(token, period) {
      const url = `${API_ENDPOINT}?period=${period}`;
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) throw new Error(`[${period}] API Response: ${res.status}`);
      const data = await res.json();
      const list = (data.leaderboard || data.data || []).map((u, idx) => normalizeUser(u, idx + 1));
      if (list.length) return list;
      if (period === 'daily') return (data.daily_leaderboard || []).map((u, idx) => normalizeUser(u, idx + 1));
      if (period === 'weekly') return (data.weekly_leaderboard || []).map((u, idx) => normalizeUser(u, idx + 1));
      return [];
    }

    async function fetchApiData(token) {
      try {
        const [daily, weekly] = await Promise.all([
          fetchPeriodBoard(token, 'daily'),
          fetchPeriodBoard(token, 'weekly')
        ]);
        boardData.daily = daily;
        boardData.weekly = weekly;
        boardData.cumulative = buildCumulativeBoard(daily, weekly);
        renderCurrentBoard();
      } catch (err) {
        console.error('Fetch Data Error:', err);
        document.getElementById('leaderboard-list').innerHTML = '<div class="empty-state">讀取排行榜失敗，請稍後重整</div>';
      }
    }

    function enableDevMode() {
      document.getElementById('dev-banner').style.display = 'block';
      boardData.daily = [
        { rank: 1, user_id: '100001', total_diamonds: 280000, daily_first_count: 4, weekly_first_count: 1 },
        { rank: 2, user_id: '100002', total_diamonds: 230000, daily_first_count: 1, weekly_first_count: 0 },
        { rank: 3, user_id: '100003', total_diamonds: 180000, daily_first_count: 0, weekly_first_count: 2 },
        { rank: 4, user_id: '100004', total_diamonds: 90000, daily_first_count: 0, weekly_first_count: 0 },
        { rank: 5, user_id: '100005', total_diamonds: 60000, daily_first_count: 0, weekly_first_count: 0 }
      ];
      boardData.weekly = [
        { rank: 1, user_id: '100003', total_diamonds: 940000, daily_first_count: 0, weekly_first_count: 2 },
        { rank: 2, user_id: '100001', total_diamonds: 820000, daily_first_count: 4, weekly_first_count: 1 },
        { rank: 3, user_id: '100006', total_diamonds: 640000, daily_first_count: 0, weekly_first_count: 1 },
        { rank: 4, user_id: '100002', total_diamonds: 580000, daily_first_count: 1, weekly_first_count: 0 }
      ];
      boardData.cumulative = buildCumulativeBoard(boardData.daily, boardData.weekly);
      renderCurrentBoard();
    }

    function setupTabs() {
      document.querySelectorAll('.tab-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          currentTab = btn.dataset.tab;
          renderCurrentBoard();
          updateCountdown();
        });
      });
    }

    function postIframeReady() {
      window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
    }

    document.addEventListener('click', (e) => {
      if (window.self === window.top || !isMobileDevice()) return;
      const link = e.target.closest('a[href]');
      if (!link) return;
      e.preventDefault();
      window.parent.postMessage({ type: 'PWA_NAVIGATE', url: link.href }, '*');
    });

    window.addEventListener('DOMContentLoaded', () => {
      setupPwaMode();
      setupTabs();
      updateCountdown();
      setInterval(updateCountdown, 1000);

      setTimeout(postIframeReady, 100);
      handshakeRetryInterval = setInterval(() => {
        if (!swagToken) postIframeReady();
      }, 3000);

      if (window.self === window.top) {
        setTimeout(() => {
          if (!swagToken) {
            clearInterval(handshakeRetryInterval);
            enableDevMode();
          }
        }, 1500);
      }
    });

    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || data.type !== 'SET_TOKEN') return;
      if (swagToken === data.token) return;

      swagToken = data.token;
      if (handshakeRetryInterval) {
        clearInterval(handshakeRetryInterval);
        handshakeRetryInterval = null;
      }
      fetchApiData(swagToken);
    });
  </script>
</body>
</html>
