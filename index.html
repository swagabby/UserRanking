<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用戶榮譽排行榜 - Tokens 規格版</title>
<style>
  /* 根據 Token 檔案定義的變數 */
  :root {
    --font-main: "PingFang TC", sans-serif;
    --surface: #191919;
    --surface-container: #232323;
    --primary: #00D2BE;
    --loverse-pink: #F6418D;
    --asset-purple: #8238BA;
    --text-primary: #FFFFFF;
    --text-secondary: #C8C8C8;
    --outline: #474747;
    --gold: #FFA500;
  }

  body {
    font-family: var(--font-main);
    background-color: #000;
    color: var(--text-primary);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .phone-container {
    width: 360px; /* Mobile.tokens Device-width */
    height: 740px; /* Mobile.tokens Device-height */
    background-color: var(--surface);
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    position: relative;
    overflow: hidden;
    border: 8px solid #333;
    border-radius: 40px;
  }

  .content-scroll {
    height: calc(100% - 110px);
    overflow-y: auto;
  }
  .content-scroll::-webkit-scrollbar { width: 0px; }

  /* Header */
  .header {
    padding: 24px 16px;
    text-align: center;
    border-bottom: 1px solid var(--outline);
  }
  .header h1 {
    margin: 0;
    font-size: 28px; /* Headline Small */
    font-weight: 600;
  }

  /* Main Tabs */
  .tabs-main {
    display: flex;
    justify-content: space-around;
    background-color: var(--surface-container);
    padding: 12px 0;
  }
  .tab-item {
    font-size: 14px; /* Body Medium */
    color: var(--text-secondary);
    cursor: pointer;
    padding: 4px 8px;
    position: relative;
  }
  .tab-item.active { color: var(--primary); font-weight: 600; }
  .tab-item.active::after {
    content: ''; position: absolute; bottom: -12px; left: 0; width: 100%; height: 2px; background-color: var(--primary);
  }

  /* Sub Tabs for Cumulative */
  .tabs-sub {
    display: none; /* 預設隱藏，累積榜時顯示 */
    background-color: #2a2a2a;
    padding: 8px 16px;
    gap: 8px;
    overflow-x: auto;
  }
  .sub-item {
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--surface-container);
    padding: 6px 12px;
    border-radius: 100px;
    white-space: nowrap;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .sub-item.active { border-color: var(--asset-purple); color: var(--asset-purple); }

  /* Podium */
  .podium {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding: 40px 10px 20px;
    background: linear-gradient(180deg, rgba(0,210,190,0.1) 0%, transparent 100%);
  }
  .podium-item { text-align: center; width: 100px; position: relative; }
  .avatar-round { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--outline); object-fit: cover; }
  .no1 .avatar-round { width: 84px; height: 84px; border-color: var(--gold); }
  .rank-pill { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; font-size: 10px; font-weight: bold; border-radius: 10px; padding: 2px 8px; }

  /* List Table Style */
  .list-table { padding: 0; }
  .list-row {
    display: flex;
    align-items: center;
    padding: 16px;
    border-bottom: 1px solid var(--outline);
  }
  .rank-num { width: 32px; font-weight: 600; font-size: 16px; color: var(--text-secondary); }
  .avatar-square { width: 40px; height: 40px; border-radius: 4px; margin-right: 12px; object-fit: cover; }
  .user-name { flex: 1; font-size: 14px; }
  .data-value { font-weight: 600; color: var(--primary); }

  /* Sticky Footer */
  .sticky-footer {
    position: absolute;
    bottom: 24px;
    left: 12px;
    right: 12px;
    background: var(--surface-container);
    border: 1px solid var(--primary);
    border-radius: 16px;
    padding: 12px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .my-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .my-avatar { width: 32px; height: 32px; border-radius: 4px; margin-right: 8px; }
  .footer-tip { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-secondary); border-top: 1px solid var(--outline); padding-top: 8px; }
  .btn-action { background: var(--primary); color: #000; border: none; padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 600; }

</style>
</head>
<body>

<div class="phone-container">
  <div class="content-scroll" id="scrollArea">
    <div class="header">
      <h1 id="mainTitle">即時榮譽榜</h1>
    </div>

    <div class="tabs-main">
      <div class="tab-item active" onclick="changeMode('hour', this)">小時</div>
      <div class="tab-item" onclick="changeMode('day', this)">日</div>
      <div class="tab-item" onclick="changeMode('week', this)">週</div>
      <div class="tab-item" onclick="changeMode('month', this)">月</div>
      <div class="tab-item" onclick="changeMode('all', this)">累積榜</div>
    </div>

    <div class="tabs-sub" id="subTabs">
      <div class="sub-item active" onclick="changeSub('h_win', this)">小時冠軍累積</div>
      <div class="sub-item" onclick="changeSub('d_win', this)">日冠軍累積</div>
      <div class="sub-item" onclick="changeSub('w_win', this)">週冠軍累積</div>
    </div>

    <div id="podiumView">
      <div class="podium" id="podiumContent"></div>
    </div>
    
    <div class="list-table" id="listView">
      </div>
  </div>

  <div class="sticky-footer" id="footerBar">
    <div class="my-info">
      <div style="display:flex; align-items:center;">
        <img src="https://api.dicebear.com/8.x/avataaars/svg?seed=Me" class="my-avatar">
        <span style="font-size:14px;">我的排名：<strong id="myRankNum" style="color:var(--primary)">#7</strong></span>
      </div>
      <span id="myValueText" style="font-size:14px; font-weight:600;">48,000 💎</span>
    </div>
    <div class="footer-tip">
      <span id="gapText">距離上一名還差 3,200 💎</span>
      <button class="btn-action">立即衝榜</button>
    </div>
  </div>
</div>

<script>
const data = {
  hour: {
    color: "#F6418D",
    isPodium: true,
    title: "小時即時榜",
    unit: "💎",
    top3: [{n:"大佬一號",v:"120k",s:"1"},{n:"玩家二號",v:"98k",s:"2"},{n:"老手三號",v:"85k",s:"3"}],
    list: [{r:4,n:"貓奴",v:"70k"},{r:5,n:"衝榜人",v:"62k"},{r:7,n:"我是七號(Me)",v:"48k",me:true}],
    my: {r:"#7", v:"48,000 💎", g:"距離上一名還差 3,200 💎"}
  },
  all: {
    color: "#8238BA",
    isPodium: false,
    title: "傳奇奪冠累積榜",
    unit: "次",
    list: [
      {r:1,n:"教父",v:"425"}, {r:2,n:"大亨",v:"312"}, {r:3,n:"收藏家",v:"280"},
      {r:4,n:"神秘人",v:"150"}, {r:12,n:"我是七號(Me)",v:"18",me:true}
    ],
    my: {r:"#12", v:"累積奪冠：18 次", g:"再拿 3 次冠軍可提升排名"}
  }
};

function renderList(modeData) {
  const listArea = document.getElementById('listView');
  listArea.innerHTML = modeData.list.map(item => `
    <div class="list-row" ${item.me ? 'style="background:rgba(0,210,190,0.05)"' : ''}>
      <div class="rank-num" ${item.me ? 'style="color:var(--primary)"' : ''}>${item.r}</div>
      <img src="https://api.dicebear.com/8.x/initials/svg?seed=${item.n}" class="avatar-square">
      <div class="user-name">${item.n}</div>
      <div class="data-value" style="color:${modeData.color}">${item.v} ${modeData.unit}</div>
    </div>
  `).join('');
}

function changeMode(type, el) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  
  const modeData = (type === 'all') ? data.all : data.hour;
  const themeColor = modeData.color;
  
  document.documentElement.style.setProperty('--primary', themeColor);
  document.getElementById('mainTitle').innerText = modeData.title;
  document.getElementById('subTabs').style.display = (type === 'all') ? 'flex' : 'none';
  document.getElementById('podiumView').style.display = modeData.isPodium ? 'block' : 'none';
  
  if(modeData.isPodium) {
    document.getElementById('podiumContent').innerHTML = `
      <div class="podium-item no2"><img src="https://api.dicebear.com/8.x/avataaars/svg?seed=2" class="avatar-round"><div class="rank-pill">2</div><div class="nickname">${modeData.top3[1].n}</div></div>
      <div class="podium-item no1"><img src="https://api.dicebear.com/8.x/avataaars/svg?seed=1" class="avatar-round"><div class="rank-pill" style="background:var(--gold)">1</div><div class="nickname">${modeData.top3[0].n}</div></div>
      <div class="podium-item no3"><img src="https://api.dicebear.com/8.x/avataaars/svg?seed=3" class="avatar-round"><div class="rank-pill">3</div><div class="nickname">${modeData.top3[2].n}</div></div>
    `;
  }
  
  renderList(modeData);
  document.getElementById('myRankNum').innerText = modeData.my.r;
  document.getElementById('myValueText').innerText = modeData.my.v;
  document.getElementById('gapText').innerHTML = modeData.my.g;
  document.getElementById('scrollArea').scrollTop = 0;
}

function changeSub(sub, el) {
  document.querySelectorAll('.sub-item').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  // 這裡可以根據 sub 類型載入不同的累積數據
}

window.onload = () => changeMode('hour', document.querySelector('.tab-item'));
</script>
</body>
</html>
