<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2026 璀璨之星爭奪戰</title>
  <style>
    /* === 核心變數 & 重置 === */
    :root {
      --bg-dark: #0f111a;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #ffffff;
      --text-muted: #94a3b8;
      --accent-gold: #fbbf24;
      --accent-silver: #cbd5e1;
      --accent-bronze: #b45309;
      --accent-gold-glow: rgba(251, 191, 36, 0.3);
      --skeleton-base: #1e293b;
      --skeleton-shine: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at top right, rgba(30, 58, 138, 0.2), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(88, 28, 135, 0.2), transparent 40%);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      /* 預留給底部固定個人排名的空間 */
      padding-bottom: 90px; 
    }

    /* === 語系切換器 === */
    .lang-switcher {
      position: absolute; top: 16px; right: 16px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      color: var(--text-main); padding: 6px 12px; border-radius: 20px;
      font-size: 14px; cursor: pointer; backdrop-filter: blur(10px); z-index: 100;
    }

    /* === Header === */
    .header { text-align: center; padding: 60px 20px 20px; position: relative; }
    .title {
      font-size: 32px; font-weight: 800; margin-bottom: 8px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b, #d97706);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 16px;}
    .rules-link { display: inline-block; color: var(--accent-gold); text-decoration: none; font-size: 14px; border-bottom: 1px solid var(--accent-gold); padding-bottom: 2px; }

    /* === Container === */
    .container { max-width: 500px; margin: 0 auto; padding: 0 16px; }
    .glass-card {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 20px; backdrop-filter: blur(12px); margin-bottom: 24px;
    }

    /* === 標籤頁 (Tabs) === */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; }
    .tab-btn {
      flex: 1; padding: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      border-radius: 12px; color: var(--text-muted); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s;
    }
    .tab-btn.active { background: rgba(251, 191, 36, 0.15); border-color: var(--accent-gold); color: var(--accent-gold); }
    
    .sub-tabs { display: none; gap: 8px; margin-bottom: 16px; justify-content: center; }
    .sub-tabs.show { display: flex; }
    .sub-tab-btn {
      padding: 6px 16px; background: transparent; border: 1px solid var(--glass-border);
      border-radius: 20px; color: var(--text-muted); font-size: 13px; cursor: pointer; transition: all 0.3s;
    }
    .sub-tab-btn.active { background: var(--glass-bg); color: #fff; border-color: rgba(255,255,255,0.3); }

    /* === 前三名頒獎台 (Podium) === */
    .podium-container {
      display: flex; justify-content: center; align-items: flex-end;
      height: 180px; margin-bottom: 30px; gap: 12px;
    }
    .podium-item { display: flex; flex-direction: column; align-items: center; width: 30%; position: relative; }
    /* 排列順序： 2, 1, 3 */
    .podium-item.rank-1 { order: 2; z-index: 3; }
    .podium-item.rank-2 { order: 1; z-index: 2; }
    .podium-item.rank-3 { order: 3; z-index: 1; }

    .avatar-wrapper { position: relative; display: flex; justify-content: center; align-items: center; }
    .avatar-circle {
      border-radius: 50%; object-fit: cover; background: var(--skeleton-base);
      border: 3px solid transparent; padding: 2px;
    }
    .rank-1 .avatar-circle { width: 80px; height: 80px; border-color: var(--accent-gold); box-shadow: 0 0 20px var(--accent-gold-glow); }
    .rank-2 .avatar-circle { width: 65px; height: 65px; border-color: var(--accent-silver); }
    .rank-3 .avatar-circle { width: 65px; height: 65px; border-color: var(--accent-bronze); }

    .podium-badge {
      position: absolute; bottom: -8px; width: 24px; height: 24px; border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      font-size: 12px; font-weight: bold; color: #000; border: 2px solid var(--bg-dark);
    }
    .rank-1 .podium-badge { background: var(--accent-gold); width: 28px; height: 28px; bottom: -10px; font-size: 14px; }
    .rank-2 .podium-badge { background: var(--accent-silver); }
    .rank-3 .podium-badge { background: var(--accent-bronze); }

    .podium-name { font-size: 13px; font-weight: 500; margin-top: 16px; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rank-1 .podium-name { font-size: 15px; font-weight: 700; color: var(--accent-gold); }
    .podium-score { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; margin-top: 4px; }

    /* === 排行榜列表 (4名以後) === */
    .list-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .list-item:last-child { border-bottom: none; }
    .rank-num { width: 32px; font-size: 16px; font-weight: 700; color: var(--text-muted); text-align: center; }
    .list-avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; background: var(--skeleton-base); }
    .user-info { flex: 1; }
    .user-id { font-size: 15px; font-weight: 500; }
    .score-wrap { display: flex; align-items: center; gap: 4px; }
    .score-val { font-size: 15px; font-weight: 600; color: var(--accent-gold); }
    .diamond-icon { width: 16px; height: 16px; fill: var(--accent-gold); }

    /* === 固定置底：個人狀態區塊 === */
    .sticky-footer {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: rgba(15, 17, 26, 0.95);
      border-top: 1px solid var(--glass-border);
      padding: 16px 24px;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      z-index: 50;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
    }
    .sticky-footer-inner {
      max-width: 500px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
    }
    .me-block { display: flex; flex-direction: column; }
    .me-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .me-value { font-size: 22px; font-weight: 700; color: var(--accent-gold); }
    .me-value.rank-text { color: #fff; }

    /* === Skeleton Loading === */
    .skeleton {
      background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%);
      background-size: 200% 100%; animation: skeleton-loading 1.5s infinite;
      border-radius: 4px; color: transparent !important;
    }
    .skeleton * { visibility: hidden; }
    @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* === Dev Mode Banner === */
    #dev-banner {
      display: none; position: fixed; top: 0; left: 0; width: 100%;
      background: #ef4444; color: #fff; text-align: center; padding: 8px;
      font-size: 13px; font-weight: bold; z-index: 9999;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3); animation: slideDown 0.3s ease-out;
    }
    @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

  </style>
</head>
<body>

  <!-- 本地預覽防呆提示 -->
  <div id="dev-banner">⚠️ [DEV MODE] 目前處於本地預覽模式，資料皆為假資料，請勿作為正式營運參考！</div>

  <button class="lang-switcher" id="langBtn" onclick="toggleLang()">繁體中文</button>

  <div class="header">
    <div class="title" data-i18n="title">2026 璀璨之星爭奪戰</div>
    <div class="subtitle" data-i18n="time">活動時間：2026/04/07 ~ 2026/04/30</div>
    <a href="https://swag.live/campaign/rules" target="_blank" class="rules-link" data-i18n="rules">查看詳細活動規則</a>
  </div>

  <div class="container">
    
    <!-- 主標籤頁 (日榜 / 週榜 / 累積) -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('day')" data-i18n="tabDay">日榜</button>
      <button class="tab-btn" onclick="switchTab('week')" data-i18n="tabWeek">週榜</button>
      <button class="tab-btn" onclick="switchTab('cumulative')" data-i18n="tabCumulative">累積次數</button>
    </div>

    <!-- 子標籤頁 (僅在點擊累積時顯示) -->
    <div class="sub-tabs" id="cumulative-sub-tabs">
      <button class="sub-tab-btn active" onclick="switchSubTab('cumulative_day')" data-i18n="subTabDay">日榜累積</button>
      <button class="sub-tab-btn" onclick="switchSubTab('cumulative_week')" data-i18n="subTabWeek">週榜累積</button>
    </div>

    <div class="glass-card" style="padding-top: 30px;">
      
      <!-- Top 3 頒獎台 -->
      <div class="podium-container" id="podium-area">
        <!-- 骨架屏預設顯示 -->
        <div class="podium-item rank-2"><div class="avatar-wrapper"><div class="avatar-circle skeleton" style="width:65px; height:65px;"></div></div><div class="podium-name skeleton" style="width:50px;">-</div></div>
        <div class="podium-item rank-1"><div class="avatar-wrapper"><div class="avatar-circle skeleton" style="width:80px; height:80px;"></div></div><div class="podium-name skeleton" style="width:60px;">-</div></div>
        <div class="podium-item rank-3"><div class="avatar-wrapper"><div class="avatar-circle skeleton" style="width:65px; height:65px;"></div></div><div class="podium-name skeleton" style="width:50px;">-</div></div>
      </div>

      <!-- 第4名之後列表 -->
      <div id="leaderboard-list">
        <div class="list-item"><div class="rank-num skeleton">4</div><div class="user-info skeleton" style="width:100px;">MaskedUser</div></div>
        <div class="list-item"><div class="rank-num skeleton">5</div><div class="user-info skeleton" style="width:100px;">MaskedUser</div></div>
        <div class="list-item"><div class="rank-num skeleton">6</div><div class="user-info skeleton" style="width:100px;">MaskedUser</div></div>
      </div>
      
    </div>
  </div>

  <!-- 置底固定：個人資料區塊 -->
  <div class="sticky-footer">
    <div class="sticky-footer-inner">
      <div class="me-block">
        <div class="me-label" data-i18n="myRank">我的排名</div>
        <div class="me-value rank-text skeleton" id="my-rank" style="min-width: 60px;">--</div>
      </div>
      <div class="me-block" style="text-align: right;">
        <div class="me-label" id="my-score-label" data-i18n="myScore">累積鑽石</div>
        <div class="score-wrap skeleton" id="my-score-wrap" style="min-width: 80px; justify-content: flex-end;">
          <svg class="diamond-icon" id="my-diamond-icon" viewBox="0 0 24 24"><path d="M12 2L2 9l10 13L22 9l-10-7zm0 2.8l6.3 4.4H5.7L12 4.8zM4.1 10h15.8L12 20.3 4.1 10z"/></svg>
          <span class="me-value" id="my-score">--</span>
          <span id="my-score-unit" style="display:none; font-size:14px; font-weight:bold; color:var(--accent-gold); margin-left:4px;" data-i18n="unitTimes">次</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // 1. 環境變數與狀態設定
    // ==========================================
    const API_ENDPOINT = 'https://swag-campaign-api-905468082258.asia-east1.run.app/api/leaderboard';
    let swagToken = null;
    let handshakeRetryInterval = null;
    
    // 當前模式: day, week, cumulative_day, cumulative_week
    let currentMode = 'day'; 

    // ==========================================
    // 2. 多語系 (I18n) 實作
    // ==========================================
    const i18n = {
      'zh-TW': { title: '2026 璀璨之星爭奪戰', time: '活動時間：2026/04/07 ~ 2026/04/30', rules: '查看詳細活動規則', myRank: '我的排名', myScore: '累積鑽石', myScoreTimes: '累積獲得', unranked: '未上榜', langName: '繁體中文', tabDay: '日榜', tabWeek: '週榜', tabCumulative: '累積次數', subTabDay: '日榜累積', subTabWeek: '週榜累積', unitTimes: '次' },
      'zh-CN': { title: '2026 璀璨之星争夺战', time: '活动时间：2026/04/07 ~ 2026/04/30', rules: '查看详细活动规则', myRank: '我的排名', myScore: '累计钻石', myScoreTimes: '累计获得', unranked: '未上榜', langName: '简体中文', tabDay: '日榜', tabWeek: '周榜', tabCumulative: '累计次数', subTabDay: '日榜累计', subTabWeek: '周榜累计', unitTimes: '次' },
      'en': { title: '2026 Star Diamond Battle', time: 'Period: Apr 7 - Apr 30, 2026', rules: 'View Rules', myRank: 'My Rank', myScore: 'Diamonds', myScoreTimes: 'Total Wins', unranked: 'Unranked', langName: 'English', tabDay: 'Daily', tabWeek: 'Weekly', tabCumulative: 'Cumulative', subTabDay: 'Daily Wins', subTabWeek: 'Weekly Wins', unitTimes: 'Wins' },
      'ja': { title: '2026 スターダイヤ争奪戦', time: '開催期間：2026/04/07 ~ 2026/04/30', rules: '詳細ルール', myRank: '私の順位', myScore: '獲得ダイヤ', myScoreTimes: '獲得回数', unranked: 'ランク外', langName: '日本語', tabDay: 'デイリー', tabWeek: 'ウィークリー', tabCumulative: '累積回数', subTabDay: 'デイリー累積', subTabWeek: 'ウィークリー累積', unitTimes: '回' }
    };
    const langs =['zh-TW', 'zh-CN', 'en', 'ja'];
    let currentLangIdx = 0;

    function applyLang(langKey) {
      const dict = i18n[langKey];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.innerText = dict[el.getAttribute('data-i18n')];
      });
      document.getElementById('langBtn').innerText = dict.langName;
      
      // 更新個人的「未上榜」狀態
      const myRankEl = document.getElementById('my-rank');
      if (myRankEl && !myRankEl.classList.contains('skeleton') && myRankEl.getAttribute('data-raw') === '-1') {
        myRankEl.innerText = dict.unranked;
      }

      // 更新下方標題 (鑽石 vs 次數)
      const isCumulative = currentMode.includes('cumulative');
      document.getElementById('my-score-label').innerText = isCumulative ? dict.myScoreTimes : dict.myScore;
    }

    function toggleLang() {
      currentLangIdx = (currentLangIdx + 1) % langs.length;
      applyLang(langs[currentLangIdx]);
    }

    // ==========================================
    // 3. UI 狀態切換邏輯 (Tabs)
    // ==========================================
    function switchTab(tabType) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      const subTabsContainer = document.getElementById('cumulative-sub-tabs');
      if (tabType === 'cumulative') {
        subTabsContainer.classList.add('show');
        // 預設選中累積日榜
        switchSubTab('cumulative_day', document.querySelector('.sub-tab-btn')); 
      } else {
        subTabsContainer.classList.remove('show');
        currentMode = tabType;
        triggerFetch();
      }
    }

    function switchSubTab(subType, el = null) {
      if(!el) el = event.target;
      document.querySelectorAll('.sub-tab-btn').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');
      currentMode = subType;
      triggerFetch();
    }

    function triggerFetch() {
      // 畫面先轉為 loading
      document.getElementById('leaderboard-list').innerHTML = `<div class="list-item"><div class="rank-num skeleton">1</div><div class="user-info skeleton" style="width:100px;">Loading</div></div>`;
      document.getElementById('podium-area').innerHTML = `<div class="podium-item rank-2"><div class="avatar-wrapper"><div class="avatar-circle skeleton" style="width:65px; height:65px;"></div></div></div><div class="podium-item rank-1"><div class="avatar-wrapper"><div class="avatar-circle skeleton" style="width:80px; height:80px;"></div></div></div><div class="podium-item rank-3"><div class="avatar-wrapper"><div class="avatar-circle skeleton" style="width:65px; height:65px;"></div></div></div>`;
      
      // 更新底部單位顯示
      const isCumulative = currentMode.includes('cumulative');
      document.getElementById('my-diamond-icon').style.display = isCumulative ? 'none' : 'block';
      document.getElementById('my-score-unit').style.display = isCumulative ? 'inline' : 'none';
      document.getElementById('my-score-label').innerText = isCumulative ? i18n[langs[currentLangIdx]].myScoreTimes : i18n[langs[currentLangIdx]].myScore;

      // 如果有 Token 或處於 DevMode，重新抓取資料
      if (swagToken) {
        fetchApiData(swagToken);
      } else if (document.getElementById('dev-banner').style.display === 'block') {
        enableDevMode(); // 重新產生假資料
      }
    }

    // ==========================================
    // 4. 渲染資料邏輯 (Podium + List + Footer)
    // ==========================================
    function getAvatarUrl(userId) {
      // 利用 dicebear 產生隨機但固定的頭像
      return `https://api.dicebear.com/8.x/initials/svg?seed=${userId}&backgroundColor=1e293b`;
    }

    function renderData(leaderboard, meData) {
      const isCumulative = currentMode.includes('cumulative');

      // --- 渲染底部個人資料 ---
      const myRankEl = document.getElementById('my-rank');
      const myScoreWrapEl = document.getElementById('my-score-wrap');
      const myScoreEl = document.getElementById('my-score');
      
      myRankEl.classList.remove('skeleton');
      myScoreWrapEl.classList.remove('skeleton');
      
      myRankEl.setAttribute('data-raw', meData.rank);
      if (meData.rank === -1) {
        myRankEl.innerText = i18n[langs[currentLangIdx]].unranked;
      } else {
        myRankEl.innerText = 'No.' + meData.rank;
      }
      myScoreEl.innerText = (meData.total_diamonds || meData.score || 0).toLocaleString();

      // --- 分離前三名與後續名單 ---
      const top3 = leaderboard.slice(0, 3);
      const rest = leaderboard.slice(3);

      // --- 渲染 Top 3 置頂頒獎台 ---
      const podiumArea = document.getElementById('podium-area');
      podiumArea.innerHTML = '';
      
      // 防呆：如果人數不足，給予空物件
      const podiumMap = [
        { data: top3[1], rank: 2 },
        { data: top3[0], rank: 1 },
        { data: top3[2], rank: 3 }
      ];

      let podiumHTML = '';
      podiumMap.forEach(item => {
        if(item.data) {
          const userText = item.data.user_id || item.data.masked_user_id;
          const score = item.data.total_diamonds || item.data.score || 0;
          const iconHTML = isCumulative ? '' : `<svg class="diamond-icon" style="width:12px;height:12px;" viewBox="0 0 24 24"><path d="M12 2L2 9l10 13L22 9l-10-7z"/></svg>`;
          const unitHTML = isCumulative ? `<span>${i18n[langs[currentLangIdx]].unitTimes}</span>` : '';

          podiumHTML += `
            <div class="podium-item rank-${item.rank}">
              <div class="avatar-wrapper">
                <img src="${getAvatarUrl(userText)}" class="avatar-circle">
                <div class="podium-badge">${item.rank}</div>
              </div>
              <div class="podium-name">${userText}</div>
              <div class="podium-score">${score.toLocaleString()} ${iconHTML} ${unitHTML}</div>
            </div>
          `;
        } else {
          // 空缺位置保留空間，維持排版
          podiumHTML += `<div class="podium-item rank-${item.rank}"></div>`;
        }
      });
      podiumArea.innerHTML = podiumHTML;

      // --- 渲染第 4 名以後列表 ---
      const listContainer = document.getElementById('leaderboard-list');
      listContainer.innerHTML = '';
      
      if (rest.length === 0 && top3.length === 0) {
        listContainer.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-muted);">目前暫無資料</div>';
        return;
      }

      rest.forEach(user => {
        const item = document.createElement('div');
        item.className = `list-item`;
        const userText = user.user_id || user.masked_user_id;
        const score = user.total_diamonds || user.score || 0;
        
        const iconHTML = isCumulative ? '' : `<svg class="diamond-icon" viewBox="0 0 24 24"><path d="M12 2L2 9l10 13L22 9l-10-7zm0 2.8l6.3 4.4H5.7L12 4.8zM4.1 10h15.8L12 20.3 4.1 10z"/></svg>`;
        const unitHTML = isCumulative ? `<span style="font-size:13px; color:var(--accent-gold); margin-left:4px;">${i18n[langs[currentLangIdx]].unitTimes}</span>` : '';

        item.innerHTML = `
          <div class="rank-num">${user.rank}</div>
          <img src="${getAvatarUrl(userText)}" class="list-avatar">
          <div class="user-info"><div class="user-id">${userText}</div></div>
          <div class="score-wrap">
            <span class="score-val">${score.toLocaleString()}</span>
            ${iconHTML}
            ${unitHTML}
          </div>
        `;
        listContainer.appendChild(item);
      });
    }

    // ==========================================
    // 5. API 獲取 (帶 Token 與 Mode 參數)
    // ==========================================
    async function fetchApiData(token) {
      try {
        const res = await fetch(`${API_ENDPOINT}?mode=${currentMode}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error(`API Response: ${res.status}`);
        const data = await res.json();
        renderData(data.leaderboard, data.me);
      } catch (err) {
        console.error('Fetch Data Error:', err);
      }
    }

    // ==========================================
    // 6. Dev Mode 假資料預覽邏輯
    // ==========================================
    function enableDevMode() {
      document.getElementById('dev-banner').style.display = 'block';
      
      const isCumulative = currentMode.includes('cumulative');
      let multiplier = isCumulative ? 1 : 10000;
      let mockLeaderboard =[];

      // 產生 10 筆假資料測試
      for(let i=1; i<=10; i++){
        mockLeaderboard.push({
           rank: i, 
           masked_user_id: `User_${Math.random().toString(36).substr(2, 4)}`, 
           total_diamonds: Math.floor((100 - i * 8) * multiplier)
        });
      }

      const mockMe = { rank: 15, total_diamonds: isCumulative ? 5 : 50000 };
      renderData(mockLeaderboard, mockMe);
    }

    // ==========================================
    // 7. SWAG Iframe 通訊協議 & PWA 攔截
    // ==========================================
    function postIframeReady() { window.parent.postMessage({ type: 'IFRAME_READY' }, '*'); }

    window.addEventListener('DOMContentLoaded', () => {
      applyLang(langs[0]);
      setTimeout(postIframeReady, 100);

      handshakeRetryInterval = setInterval(() => {
        if (!swagToken) postIframeReady();
      }, 3000);

      if (window.self === window.top) {
        setTimeout(() => {
          if (!swagToken) {
            clearInterval(handshakeRetryInterval);
            enableDevMode();
          }
        }, 2000);
      }
    });

    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data) return;

      if (data.type === 'SET_TOKEN') {
        if (swagToken === data.token) return;
        swagToken = data.token;
        if (handshakeRetryInterval) { clearInterval(handshakeRetryInterval); handshakeRetryInterval = null; }
        fetchApiData(swagToken);
      }
    });

    document.addEventListener('click', (e) => {
      if (window.self === window.top) return;
      const link = e.target.closest('a[target="_blank"]');
      if (link) {
        try {
          const url = new URL(link.href);
          if (url.hostname === 'swag.live' || url.hostname === 'www.swag.live') {
            e.preventDefault(); 
            window.parent.postMessage({ type: 'PWA_NAVIGATE', url: link.href }, '*');
          }
        } catch(err) {}
      }
    });

  </script>
</body>
</html>
