<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用戶耗鑽榮譽榜 Mockup</title>
<style>
  :root {
    --bg-color: #121212;
    --card-bg: #1e1e1e;
    --text-primary: #ffffff;
    --text-secondary: #b0b0b0;
    --accent-gold: #ffd700;
    --accent-silver: #c0c0c0;
    --accent-bronze: #cd7f32;
    --highlight: #ff4081;
  }

  /* 修正電腦顯示比例 */
  body {
    font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background-color: #000; /* 背景全黑 */
    color: var(--text-primary);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center; /* 電腦版置中 */
    align-items: center;
    min-height: 100vh;
  }

  /* 修正電腦顯示比例 (手機模式外殼) */
  .phone-container {
    width: 375px;        /* 固定手機寬度 */
    height: 812px;       /* 固定手機高度 */
    background-color: var(--card-bg);
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    position: relative;
    overflow: hidden;    /* 讓內容捲動 (下面設) */
    border: 8px solid #333; /* 增加手機邊框 */
    border-radius: 40px;    /* 圓角 */
  }

  /* 內容可捲動區 */
  .content-scroll {
    height: calc(100% - 80px); /* 扣掉吸底列高度 */
    overflow-y: auto;
    padding-bottom: 20px;
  }
  
  /* 隱藏捲動條 (美化) */
  .content-scroll::-webkit-scrollbar {
    width: 0px;
  }

  /* Header */
  .header {
    background: linear-gradient(180deg, rgba(255,64,129,0.2) 0%, rgba(30,30,30,1) 100%);
    padding: 20px;
    text-align: center;
    position: relative;
  }

  .header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .rule-icon {
    position: absolute;
    right: 20px;
    top: 20px;
    color: var(--text-secondary);
    font-size: 18px;
    cursor: pointer;
  }

  /* Tabs */
  .tabs {
    display: flex;
    justify-content: space-around;
    background-color: rgba(0,0,0,0.2);
    padding: 10px 0;
    border-bottom: 1px solid #333;
  }

  .tab {
    color: var(--text-secondary);
    font-size: 14px;
    padding: 5px 10px;
    cursor: pointer;
    position: relative;
  }

  .tab.active {
    color: var(--accent-gold);
    font-weight: 600;
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 0;
    width: 100%;
    height: 2px;
    background-color: var(--accent-gold);
  }

  /* Countdown */
  .countdown-banner {
    background-color: rgba(255, 215, 0, 0.1);
    color: var(--accent-gold);
    text-align: center;
    padding: 8px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255, 215, 0, 0.2);
  }

  /* Top 3 Podium */
  .podium {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding: 30px 10px;
    background: linear-gradient(180deg, rgba(30,30,30,1) 0%, rgba(0,0,0,0.3) 100%);
  }

  .podium-item {
    text-align: center;
    width: 100px;
    position: relative;
  }

  .podium-item.no1 {
    width: 120px;
    margin: 0 10px;
  }

  .avatar-container {
    position: relative;
    display: inline-block;
  }

  .avatar {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background-color: #444;
    border: 3px solid var(--text-secondary);
    object-fit: cover;
  }

  .podium-item.no1 .avatar {
    width: 90px;
    height: 90px;
    border-color: var(--accent-gold);
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
  }

  .podium-item.no2 .avatar {
    border-color: var(--accent-silver);
  }

  .podium-item.no3 .avatar {
    border-color: var(--accent-bronze);
  }

  .crown {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 24px;
  }

  .rank-badge {
    position: absolute;
    bottom: -5px;
    left: 50%;
    transform: translateX(-50%);
    background-color: var(--accent-gold);
    color: #000;
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: bold;
  }

  .podium-item.no2 .rank-badge { background-color: var(--accent-silver); }
  .podium-item.no3 .rank-badge { background-color: var(--accent-bronze); }

  .nickname {
    margin-top: 15px;
    font-size: 14px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .diamond-count {
    color: var(--accent-gold);
    font-size: 13px;
    margin-top: 5px;
  }

  /* Leaderboard List */
  .list-container {
    padding: 10px 0;
  }

  .list-item {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    border-bottom: 1px solid #2a2a2a;
  }

  .list-item:last-child {
    border-bottom: none;
  }

  .list-rank {
    width: 30px;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .list-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background-color: #444;
    margin-right: 15px;
  }

  .list-info {
    flex: 1;
  }

  .list-nickname {
    font-size: 14px;
  }

  .list-diamonds {
    color: var(--accent-gold);
    font-size: 12px;
    margin-top: 3px;
  }

  .list-badge {
    font-size: 16px;
    color: var(--text-secondary);
  }

  /* Sticky My Status Bar */
  .my-status-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 80px;
    z-index: 100;
    background-color: #2c2c2c;
    border-top: 2px solid var(--highlight);
    padding: 10px 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    box-shadow: 0 -5px 10px rgba(0,0,0,0.3);
  }

  .my-info-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .my-rank-info {
    display: flex;
    align-items: center;
    font-size: 14px;
  }

  .my-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background-color: #555;
    margin-right: 10px;
    border: 1px solid var(--highlight);
  }

  .my-rank-text span {
    color: var(--highlight);
    font-weight: bold;
    font-size: 16px;
  }

  .my-diamonds {
    color: var(--accent-gold);
    font-size: 14px;
  }

  .tip-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-secondary);
    border-top: 1px solid #444;
    padding-top: 8px;
  }

  .gap-info span {
    color: var(--text-primary);
    font-weight: 500;
  }

  .action-btn {
    background-color: var(--highlight);
    color: white;
    border: none;
    border-radius: 15px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
  }

  /* 手機模式隱藏捲動條控制路徑 */
  @media (max-width: 400px) {
    .phone-container {
        width: 100%;
        height: 100vh;
        border: none;
        border-radius: 0;
    }
  }

</style>
</head>
<body>

<div class="phone-container">
  
  <div class="content-scroll">
    <div class="header">
      <h1>榮譽巔峰榜</h1>
      <span class="rule-icon">❓</span>
    </div>

    <div class="tabs">
      <div class="tab active">小時榜</div>
      <div class="tab">日榜</div>
      <div class="tab">週榜</div>
      <div class="tab">月榜</div>
      <div class="tab">新星榜</div>
    </div>

    <div class="countdown-banner">
      ⏱️ 距離 14:00 結算剩餘：<strong>12分43秒</strong>
    </div>

    <div class="podium">
      <div class="podium-item no2">
        <div class="avatar-container">
          <div class="crown">🥈</div>

        </div>
        <div class="nickname">隔壁老王</div>
        <div class="diamond-count">89,200 💎</div>
      </div>
      
      <div class="podium-item no1">
        <div class="avatar-container">
          <div class="crown">🥇</div>

        </div>
        <div class="nickname">耗鑽狂魔哥</div>
        <div class="diamond-count">120,500 💎</div>
      </div>
      
      <div class="podium-item no3">
        <div class="avatar-container">
          <div class="crown">🥉</div>
          <img src="https://via.placeholder.com/70/CD7F32/FFFFFF?text=User3" alt="User 3" class="avatar">
          <div class="rank-badge">3</div>
        </div>
        <div class="nickname">小美愛跳舞</div>
        <div class="diamond-count">75,000 💎</div>
      </div>
    </div>

    <div class="list-container">
      <div class="list-item">
        <div class="list-rank">4</div>
        <img src="https://via.placeholder.com/40/444444/FFFFFF?text=U4" alt="U4" class="list-avatar">
        <div class="list-info">
          <div class="list-nickname">貓奴一號</div>
          <div class="list-diamonds">62,000 💎</div>
        </div>
        <div class="list-badge">🎖️<span style="font-size:10px;color:var(--accent-silver)">x10</span></div>
      </div>
      
      <div class="list-item">
        <div class="list-rank">5</div>
        <img src="https://via.placeholder.com/40/444444/FFFFFF?text=U5" alt="U5" class="list-avatar">
        <div class="list-info">
          <div class="list-nickname">衝榜小弟</div>
          <div class="list-diamonds">58,500 💎</div>
        </div>
        <div class="list-badge">🎖️<span style="font-size:10px;color:var(--accent-silver)">x5</span></div>
      </div>
      
      <div class="list-item">
        <div class="list-rank">6</div>
        <img src="https://via.placeholder.com/40/444444/FFFFFF?text=U6" alt="U6" class="list-avatar">
        <div class="list-info">
          <div class="list-nickname">天天解鎖</div>
          <div class="list-diamonds">51,200 💎</div>
        </div>
        <div class="list-badge">-</div>
      </div>
      <div class="list-item">
        <div class="list-rank">7</div>
        <img src="https://via.placeholder.com/40/444444/FFFFFF?text=U7" alt="U7" class="list-avatar">
        <div class="list-info">
          <div class="list-nickname">我是七號</div>
          <div class="list-diamonds">48,000 💎</div>
        </div>
        <div class="list-badge">-</div>
      </div>
    </div>
  </div> <div class="my-status-bar">
    <div class="my-info-row">
      <div class="my-rank-info">
        <img src="https://via.placeholder.com/30/FF4081/FFFFFF?text=Me" alt="Me" class="my-avatar">
        <div class="my-rank-text">我的排名：<span>#7</span></div>
      </div>
      <div class="my-diamonds">本期：<strong>45,000</strong> 💎</div>
    </div>
    <div class="tip-row">
      <div class="gap-info">
        距離第 6 名還差 <span>6,200</span> 💎
      </div>
      <button class="action-btn">立即衝榜 ></button>
    </div>
  </div>

</div>

</body>
</html>
